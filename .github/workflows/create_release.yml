name: Create Release

on:
    push:
      tags:
        - 'v*'
  
jobs:
  build:
    permissions:
      contents: write

    runs-on: ubuntu-latest
    steps:
        - name: Checkout code
          uses: actions/checkout@v4
        - name: Setup .NET
          uses: actions/setup-dotnet@v4
          with:
            dotnet-version: 10.0.x
        - name: Setup Node.js
          uses: actions/setup-node@v4
          with:
            node-version: 20
        - name: Restore packages
          run: |
            dotnet restore VxFormGenerator.Core/VxFormGenerator.Core.csproj
            dotnet restore VxFormGenerator.Components.Plain/VxFormGenerator.Components.Plain.csproj
            dotnet restore VxFormGenerator.Components.Bootstrap/VxFormGenerator.Components.Bootstrap.csproj
            dotnet restore VxFormGenerator.Tools/VxFormGenerator.Tools.csproj
        - name: Build cross-platform packages
          run: |
            dotnet build VxFormGenerator.Core/VxFormGenerator.Core.csproj --configuration Release --no-restore -m:1
            dotnet build VxFormGenerator.Components.Plain/VxFormGenerator.Components.Plain.csproj --configuration Release --no-restore -m:1
            dotnet build VxFormGenerator.Components.Bootstrap/VxFormGenerator.Components.Bootstrap.csproj --configuration Release --no-restore -m:1
            dotnet build VxFormGenerator.Tools/VxFormGenerator.Tools.csproj --configuration Release --no-restore -m:1
        - name: Package VS Code extension
          run: |
            mkdir -p artifacts
            npm --prefix extensions/vscode/vxformgenerator-scaffold install
            npm --prefix extensions/vscode/vxformgenerator-scaffold run compile
            cd extensions/vscode/vxformgenerator-scaffold
            npx @vscode/vsce package --allow-missing-repository --out ../../../artifacts/vxformgenerator-scaffold-0.1.0.vsix
        - name: Package Visual Studio extension source
          run: tar -czf artifacts/vxformgenerator-visualstudio-extension-0.1.0-source.tar.gz extensions/visualstudio
        - name: Create GitHub release
          uses: softprops/action-gh-release@v2
          with:
            generate_release_notes: true
            files: |
               VxFormGenerator.Core/bin/Release/*.nupkg
               VxFormGenerator.Components.Plain/bin/Release/*.nupkg
               VxFormGenerator.Components.Bootstrap/bin/Release/*.nupkg
               VxFormGenerator.Tools/bin/Release/*.nupkg
               artifacts/vxformgenerator-scaffold-0.1.0.vsix
               artifacts/vxformgenerator-visualstudio-extension-0.1.0-source.tar.gz
            

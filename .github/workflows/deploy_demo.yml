name: Deploy Demo

on:
  push:
    branches: [ master, develop ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Setup Pages
      uses: actions/configure-pages@v5

    - name: Publish WASM demo
      run: dotnet publish VxFormGeneratorDemo.Wasm/VxFormGeneratorDemo.Wasm.csproj --configuration Release --output publish -p:PublishTrimmed=false

    - name: Prepare GitHub Pages artifact
      shell: bash
      run: |
        site_path="publish/wwwroot"
        base_path="/${{ github.event.repository.name }}/"
        sed -i "s|<base href=\"/\" />|<base href=\"${base_path}\" />|" "${site_path}/index.html"
        cp "${site_path}/index.html" "${site_path}/404.html"
        touch "${site_path}/.nojekyll"

    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: publish/wwwroot

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
